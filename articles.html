  <script defer src="main.js"></script>
  <script>
    (function () {
      const ARTICLES = [
        {
          category: 'Interview',
          date: '2025-06-08',
          dateLabel: '8 juin 2025',
          title: 'Marquinhos : "Une aventure palpitante"',
          excerpt: "Un entretien autour des enjeux sportifs et de l'état d'esprit parisien avant une compétition majeure.",
          image: 'https://media.psg.fr/image/upload/w_1921,c_fill,g_auto,ar_3:2/f_avif,q_75/_am29025_q5d5ph',
          alt: 'Marquinhos en interview',
          link: 'https://www.psg.fr/content/marquinhos-participer-a-cette-competition-va-etre-une-aventure-palpitante'
        },
        {
          category: 'Football',
          date: '2025-06-08',
          dateLabel: '8 juin 2025',
          title: "Un quadruple historique pour le Paris Saint-Germain",
          excerpt: 'Une saison, quatre trophées : retour sur une performance collective majeure.',
          image: 'https://media.psg.fr/image/upload/w_1921,c_fill,g_auto,ar_3:2/f_avif,q_75/visuel-quadruple-169_uxd8ih',
          alt: 'Célébration du quadruple parisien',
          link: 'https://www.psg.fr/content/un-quadruple-historique-pour-le-paris-saint-germain'
        },
        {
          category: 'Explicatif',
          date: '2025-06-14',
          dateLabel: '14 juin 2025',
          title: "Coupe du Monde des Clubs : mode d'emploi",
          excerpt: "Les clés de lecture d'une nouvelle compétition internationale.",
          image: 'https://media.psg.fr/image/upload/w_1081,c_fill,g_auto,ar_3:2/f_avif,q_75/gettyimages-2219233230_yzesf4',
          alt: "Ballon de la Coupe du Monde des Clubs",
          link: 'https://www.psg.fr/content/coupe-du-monde-des-clubs-mode-demploi'
        },
        {
          category: 'Sélection',
          date: '2025-06-08',
          dateLabel: '8 juin 2025',
          title: "Le programme de la semaine internationale",
          excerpt: 'Dix-huit Parisiens appelés avec leur sélection nationale.',
          image: 'https://media.psg.fr/image/upload/w_1921,c_fill,g_auto,ar_3:2/f_avif,q_75/barcola-france-4_acxjjt',
          alt: "Joueur parisien en sélection",
          link: 'https://www.psg.fr/content/le-programme-de-la-semaine-internationale'
        },
        {
          category: 'Reportage',
          date: '2025-05-01',
          dateLabel: '1 mai 2025',
          title: 'Les U19 pour une place en finale',
          excerpt: 'Championnat National U19, demi-finale au Campus PSG.',
          image: '',
          alt: '',
          link: 'https://www.psg.fr/content/les-u19-pour-une-place-en-finale'
        },
        {
          category: 'Reportage',
          date: '2025-05-15',
          dateLabel: '15 mai 2025',
          title: 'Défaite en finale contre le Portugal pour la France U17',
          excerpt: "Retour sur la finale de l'UEFA U17 Championship Albania 2025.",
          image: '',
          alt: '',
          link: 'https://www.psg.fr/content/defaite-en-finale-contre-le-portugal-pour-la-france-u17'
        },
        {
          category: 'Analyse',
          date: '2025-04-20',
          dateLabel: '20 avril 2025',
          title: "Coupe du Monde des Clubs : les enjeux",
          excerpt: 'Angles, calendrier et repères pour suivre la compétition.',
          image: '',
          alt: '',
          link: 'https://www.psg.fr/content/coupe-du-monde-des-clubs-mode-demploi'
        }
      ];

      const pageSize = 6;
      let currentPage = 1;
      const totalPages = Math.max(1, Math.ceil(ARTICLES.length / pageSize));

      function renderPage(page) {
        const grid = document.getElementById('articles-grid');
        grid.innerHTML = '';
        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        const items = ARTICLES.slice(start, end);

        items.forEach(a => {
          const article = document.createElement('article');
          article.className = 'card';

          const imgHtml = a.image ? `<img src="${a.image}" alt="${a.alt || ''}" loading="lazy">` : '';

          article.innerHTML = `
            ${imgHtml}
            <div class="card-body">
              <p class="meta"><span>${a.category}</span> - <time datetime="${a.date}">${a.dateLabel}</time></p>
              <h3>${a.title}</h3>
              <p>${a.excerpt || ''}</p>
              <a class="card-link" href="${a.link}" target="_blank" rel="noopener">Lire l'article</a>
            </div>
          `;

          grid.appendChild(article);
        });

        renderPagination();
      }

      function renderPagination() {
        const nav = document.getElementById('articles-pagination');
        nav.innerHTML = '';

        const prev = document.createElement('button');
        prev.className = 'btn';
        prev.textContent = 'Précédent';
        prev.disabled = currentPage === 1;
        prev.addEventListener('click', () => {
          if (currentPage > 1) { currentPage--; renderPage(currentPage); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        });
        nav.appendChild(prev);

        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement('button');
          btn.className = 'btn';
          if (i === currentPage) btn.classList.add('current');
          btn.textContent = i;
          btn.addEventListener('click', () => { currentPage = i; renderPage(currentPage); window.scrollTo({ top: 0, behavior: 'smooth' }); });
          nav.appendChild(btn);
        }

        const next = document.createElement('button');
        next.className = 'btn';
        next.textContent = 'Suivant';
        next.disabled = currentPage === totalPages;
        next.addEventListener('click', () => {
          if (currentPage < totalPages) { currentPage++; renderPage(currentPage); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        });
        nav.appendChild(next);
      }

      document.addEventListener('DOMContentLoaded', () => {
        renderPage(currentPage);
      });
    })();
  </script>
</body>
